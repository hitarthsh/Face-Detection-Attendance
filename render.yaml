# Render Blueprint: https://render.com/docs/infrastructure-as-code
#
# Before first deploy:
# 1. MongoDB Atlas — cluster + DB user; Network Access allow 0.0.0.0/0 (or lock down later).
# 2. In Render Dashboard, set a Mongo URI secret: MONGODB_URI_PROD (or MONGODB_URI / MONGO_URL / DATABASE_URL).
# 3. Service URL will be https://face-attendance-api.onrender.com — update frontend/src/config/apiBaseUrl.ts if you rename the service.

services:
  - type: web
    name: face-attendance-api
    runtime: node
    region: oregon
    # Upgrade to starter (or higher) if TensorFlow init OOMs on cold start — free is smallest RAM.
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: '*'
      - key: MONGODB_URI_PROD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
